          description: Internal Server Error - An unexpected error occurred while processing the request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/simpleInternalError"

components:
  securitySchemes:
    DeviceId:
      type: apiKey
      in: header
      name: X-Device-Id
      description: The unique identifier of the device registered via /auth/devices/register
    Nonce:
      type: apiKey
      in: header
      name: X-Nonce
      description: A unique random value (e.g. UUID v4) to prevent replay attacks. Must be unique per request.
    Timestamp:
      type: apiKey
      in: header
      name: X-Timestamp
      description: Unix timestamp in milliseconds at the time the request was signed. Requests older than a server-defined threshold (e.g. 30 s) are rejected.
    Signature:
      type: apiKey
      in: header
      name: X-Signature
      description: |-
        Base64-encoded signature over the canonical request string.
