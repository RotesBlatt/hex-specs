  /stats/champions:
    get:
      operationId: getChampionStatsByRegionPatchTier
      tags:
        - Stats
      summary: Get champion aggregated stats
      description: Retrieve champion aggregated statistics for a specific region, patch, and tier.
      parameters:
        - name: region
          in: query
          required: true
          description: Region partition key used for stats aggregation and reads.
          schema:
            $ref: "#/components/schemas/Region"
          examples:
            euw1:
              value: euw1
              description: Europe West
        - name: patch
          in: query
          required: false
          schema:
            type: string
          example: "15.6"
        - name: tier
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/RankedTier"
          example: "EMERALD"
        - name: queue
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/QueueId"
          example: 420
      responses:
        "200":
          description: Champion stats retrieved successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChampionStatsListResponse"
              examples:
                euw1_success:
                  summary: Success response for region euw1
                  value:
                    success: true
                    data:
                      items:
                        - championId: 266
                          picks: 12400
                          wins: 6215
                          losses: 6185
                          bans: 1600
                          winrate: 50.12
                          pickrate: 11.3
                          banrate: 3.2
                    meta:
                      region: euw1
                      patch: "15.6"
                      tier: "EMERALD"
                      queue: 420
                      generatedAt: "2026-04-01T10:00:00Z"
                      dataFreshnessSeconds: 120
                      totalGames: 109734
        "400":
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/validationError"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/simpleInternalError"
  /stats/champions/{championId}:
    get:
      operationId: getChampionStatsDetailByRegion
      tags:
        - Stats
      summary: Get champion stats detail
      description: Retrieve aggregated stats for a single champion for a specific region.
      parameters:
        - name: championId
          in: path
          required: true
          schema:
            type: integer
            format: int32
          example: 266
        - name: region
          in: query
          required: true
          description: Region partition key used for stats aggregation and reads.
          schema:
            $ref: "#/components/schemas/Region"
        - name: patch
          in: query
          required: true
          schema:
            type: string
          example: "15.6"
        - name: tier
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RankedTier"
          example: "EMERALD"
        - name: queue
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/QueueId"
          example: 420
      responses:
        "200":
          description: Champion stats detail retrieved successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChampionStatsDetailResponse"
        "400":
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/validationError"
        "404":
          description: Champion stats not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/simpleError"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/simpleInternalError"
  /stats/champions/{championId}/matchups:
    get:
      operationId: getChampionMatchupsByRegion
      tags:
        - Stats
      summary: Get champion directional matchup stats
      description: |-
        Retrieve directional champion-vs-champion matchup metrics.
        All metrics are computed within the requested region only.
        For matchup endpoints, results are directional: A vs B is distinct from B vs A.
        When lane cannot be reliably inferred, records use lane=unknown.
        All rates are returned as decimal values in range [0, 1].
      parameters:
        - name: championId
          in: path
          required: true
          schema:
            type: integer
            format: int32
        - name: region
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Region"
        - name: patch
          in: query
          required: true
          schema:
            type: string
        - name: tier
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/RankedTier"
        - name: queue
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/QueueId"
        - name: lane
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Lane"
            default: unknown
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 20
            maximum: 100
      responses:
        "200":
