    get:
      operationId: getAuthChallenge
      security: []
      tags:
        - Authentication
      summary: Get an authentication challenge for signing
      description: Retrieve a unique authentication challenge that can be signed with the device's private key to authenticate requests
      parameters:
        - name: deviceId
          in: path
          required: true
          description: The unique identifier of the device registered via /auth/devices/register
          schema:
            type: string
            x-type: string
          examples:
