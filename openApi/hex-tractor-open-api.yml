  /players/{puuid}/stats/request:
    post:
      operationId: requestPlayerStatsJob
      tags:
        - PlayerStats
      summary: Request player stats computation
      description: |-
        Request player stats computation for a specific region and stats type.
        Behavior:
        - If valid cache exists for same (region, puuid, type, paramsHash), return 200 with cached result.
        - If equivalent in-flight job exists, return 202 with existing jobId (do not enqueue duplicate).
        - Else enqueue a new job and return 202 with new jobId.
      parameters:
        - name: puuid
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerStatsJobRequest"
      responses:
        "200":
          description: Cache hit, ready result returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerStatsCacheEntryResponse"
              examples:
                cache_hit:
                  summary: Cached result returned immediately
                  value:
                    success: true
                    data:
                      jobId: "job_01HTCXYZ123"
                      region: euw1
                      puuid: "rkrmXhHeKayKBCXI_xngBNpnY_rBXwyPMW_PtY-JaSzHj80gjfuesdk5GtiRxqGxavf2T7Ek-JPJrg"
                      type: champions
                      paramsHash: "sha256:f9d8ee9f4b6f"
                      status: ready
                      computedAt: "2026-04-01T10:00:00Z"
                      expiresAt: "2026-04-01T10:10:00Z"
                      lastSourceMatchAt: "2026-04-01T09:58:02Z"
                      result:
                        champions:
                          - championId: 266
                            games: 17
                            wins: 9
                    meta:
                      region: euw1
        "202":
          description: Accepted, existing in-flight job reused or new job created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerStatsJobAcceptedResponse"
              examples:
                in_flight_existing_job:
                  summary: Existing in-flight job returned
                  value:
                    success: true
                    data:
                      jobId: "job_01HTCXYZ123"
                      status: running
                      region: euw1
                      puuid: "rkrmXhHeKayKBCXI_xngBNpnY_rBXwyPMW_PtY-JaSzHj80gjfuesdk5GtiRxqGxavf2T7Ek-JPJrg"
                    meta:
                      region: euw1
        "400":
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/validationError"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/simpleInternalError"
