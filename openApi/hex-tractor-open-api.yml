openapi: "3.0.0"
info:
  title: Hex-Tractor API
  version: "1.0"
  description: The Hex-Tractor API provides endpoints for retrieving Riot account and match information for the Hex-Tractor application. It allows clients to access Riot account details, league entries, and match information using various parameters such as summoner name, tag line, PUUID, and match ID. The API is designed to facilitate the integration of Riot data into the Hex-Tractor application, enabling users to view their account information and match history seamlessly.
servers:
  - url: http://localhost:3000/api
    description: Local Development server
security:
  - DeviceId: []
    Nonce: []
    Timestamp: []
    Signature: []
paths:
  /account/by-name/{region}/{summonerName}/{tagLine}:
    get:
      operationId: getAccountBySummonerName
      tags:
        - Account
      summary: Get Riot account information by summoner name and tag line
      description: Retrieve Riot account details using the summoner name and tag line for a specific region
      parameters:
        - name: region
          in: path
          required: true
          description: The region of the Riot account (e.g., NA, EUW, EUNE)
          schema:
            $ref: "#/components/schemas/Region"
          examples:
            NA:
              value: na1
              description: North America
            EUW:
              value: euw1
              description: Europe West
            EUNE:
              value: eun1
              description: Europe Nordic & East
        - name: summonerName
          in: path
          required: true
          schema:
            type: string
          examples:
            valid_name:
              value: "helomatch"
              description: A sample summoner name for EUW region
        - name: tagLine
          in: path
          required: true
          schema:
            type: string
          examples:
            valid_tag:
              value: "EUW"
              description: A sample tag line for EUW region
            helomatch_tag:
              value: "5767"
              description: Tag line for the summoner name "helomatch"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountInfo"
        "400":
          description: Bad Request - Invalid input parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/validationError"
        "401":
          description: Unauthorized - Invalid or missing Authentication
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/simpleError"
        "404":
          description: Not Found - Account not found for the given parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/simpleError"
        "429":
          description: Too Many Requests - Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/simpleError"
        "500":
          description: Internal Server Error - An unexpected error occurred
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/simpleInternalError"
  /account/by-puuid/{region}/{puuid}:
    get:
      operationId: getAccountByPuuid
      tags:
        - Account
      summary: Get Riot account information by puuid
      description: Retrieve Riot account details using the encrypted summoner ID for a specific region
      parameters:
        - name: region
          in: path
          required: true
          description: The region of the Riot account (e.g., NA, EUW, EUNE)
          schema:
            $ref: "#/components/schemas/Region"
          examples:
            NA:
              value: na1
              description: North America
            EUW:
              value: euw1
              description: Europe West
            EUNE:
              value: eun1
              description: Europe Nordic & East
        - name: puuid
          in: path
          required: true
          schema:
            type: string
          examples:
            valid_id:
              value: "rkrmXhHeKayKBCXI_xngBNpnY_rBXwyPMW_PtY-JaSzHj80gjfuesdk5GtiRxqGxavf2T7Ek-JPJrg"
              description: A sample encrypted summoner ID for EUW region
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountInfo"
        "400":
          description: Bad Request - Invalid input parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/validationError"
        "401":
          description: Unauthorized - Invalid or missing Authentication
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/simpleError"

        "404":
          description: Not Found - Account not found for the given parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/simpleError"
        "429":
          description: Too Many Requests - Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/simpleError"
        "500":
          description: Internal Server Error - An unexpected error occurred
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/simpleInternalError"
  /leagues/{region}/{queue}/{tier}/{division}:
    get:
      operationId: getLeagueEntries
      tags:
        - Leagues
      summary: Get Riot league entries by queue, tier, and division
      description: Retrieve Riot league entries for a specific region, queue type, tier, and division
      parameters:
        - name: region
          in: path
          required: true
          description: The region of the Riot account (e.g., NA, EUW, EUNE)
          schema:
            $ref: "#/components/schemas/Region"
          examples:
            NA:
              value: na1
              description: North America
            EUW:
              value: euw1
              description: Europe West
            EUNE:
              value: eun1
              description: Europe Nordic & East
        - name: queue
          in: path
          required: true
          description: The queue type (e.g., RANKED_SOLO_5x5, RANKED_FLEX_SR)
          schema:
            $ref: "#/components/schemas/RankedQueue"
          examples:
            solo_queue:
              value: RANKED_SOLO_5x5
              description: Ranked Solo/Duo Queue on Summoners Rift
            flex_queue:
              value: RANKED_FLEX_SR
              description: Ranked Flex Queue on Summoners Rift
        - name: tier
          in: path
          required: true
          description: The ranked tier (e.g., IRON, BRONZE, SILVER, GOLD, PLATINUM, EMERALD, DIAMOND, MASTER, GRANDMASTER, CHALLENGER)
          schema:
            $ref: "#/components/schemas/RankedTier"
          examples:
            iron_tier:
              value: IRON
              description: Iron tier in ranked play (lowest tier)
            bronze_tier:
              value: BRONZE
              description: Bronze tier in ranked play
            silver_tier:
              value: SILVER
              description: Silver tier in ranked play
            gold_tier:
              value: GOLD
              description: Gold tier in ranked play
            platinum_tier:
              value: PLATINUM
              description: Platinum tier in ranked play
            emerald_tier:
              value: EMERALD
              description: Emerald tier in ranked play
            diamond_tier:
              value: DIAMOND
              description: Diamond tier in ranked play
            master_tier:
              value: MASTER
              description: Master tier in ranked play (third highest tier)
            grandmaster_tier:
              value: GRANDMASTER
              description: Grandmaster tier in ranked play (second highest tier)
            challenger_tier:
              value: CHALLENGER
              description: Challenger tier in ranked play (highest tier)
        - name: division
          in: path
          required: true
          description: The ranked division (e.g., I, II, III, IV)
          schema:
            $ref: "#/components/schemas/RankedDivision"
          examples:
            division_i:
              value: I
              description: Division I within a ranked tier (highest division)
            division_ii:
              value: II
              description: Division II within a ranked tier
            division_iii:
              value: III
              description: Division III within a ranked tier
            division_iv:
              value: IV
              description: Division IV within a ranked tier (lowest division)
        - name: count
          in: query
          required: false
          description: The maximum number of league entries to return (optional)
          schema:
            type: integer
            format: int32
          allowEmptyValue: true
        - name: start
          in: query
          required: false
          description: The starting index for pagination of league entries (optional)
          schema:
            type: integer
            format: int32
            default: 0
          allowEmptyValue: true
      responses:
        "200":
          description: OK - League entries retrieved successfully for the specified parameters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeagueDetails"
        "400":
          description: Bad Request - Invalid input parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/validationError"
        "401":
          description: Unauthorized - Invalid or missing Authentication
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/simpleError"
        "429":
          description: Too Many Requests - Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/simpleError"
        "500":
          description: Internal Server Error - An unexpected error occurred while processing the request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/simpleInternalError"
  /matches/match/{region}/{matchId}:
    get:
      operationId: getMatchById
      tags:
        - Matches
      summary: Get Riot match details by match ID
      description: Retrieve Riot match details using the match ID for a specific region
      parameters:
        - name: region
          in: path
          required: true
          description: The region of the Riot account (e.g., America, Europe, Asia)
          schema:
            $ref: "#/components/schemas/Region"
          examples:
            euw1:
              value: euw1
            na1:
              value: na1
            kr:
              value: kr
        - name: matchId
          in: path
          required: true
          description: The ID of the match to retrieve details for
          schema:
            type: string
          examples:
            valid_match_id:
              value: "EUW1_7736139185"
              description: A sample match ID for EUW region
      responses:
        "200":
          description: OK - Match details retrieved successfully for the specified parameters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Match"
        "400":
          description: Bad Request - Invalid input parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/validationError"
        "401":
          description: Unauthorized - Invalid or missing Authentication
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/simpleError"
        "404":
          description: Not Found - Match not found for the given parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/simpleError"
        "429":
          description: Too Many Requests - Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/simpleError"
        "500":
          description: Internal Server Error - Failed to retrieve match details for the specified parameters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/simpleInternalError"
  /matches/match-ids/{region}/{puuid}:
    get:
      operationId: getMatchIdsByPuuid
      tags:
        - Matches
      summary: Get Riot match IDs by player PUUID
      description: Retrieve a list of Riot match IDs for a specific player using their encrypted PUUID and region
      parameters:
        - name: region
          in: path
          required: true
          description: The region of the Riot account (e.g., America, Europe, Asia)
          schema:
            $ref: "#/components/schemas/Region"
          examples:
            euw1:
              value: euw1
            na1:
              value: na1
            kr:
              value: kr
        - name: puuid
          in: path
          required: true
          description: The encrypted PUUID of the player to retrieve match IDs for
          schema:
            type: string
          examples:
            valid_puuid:
              value: "rkrmXhHeKayKBCXI_xngBNpnY_rBXwyPMW_PtY-JaSzHj80gjfuesdk5GtiRxqGxavf2T7Ek-JPJrg"
              description: A sample encrypted PUUID for EUW region
        - name: start
          in: query
          required: false
          description: The starting index for pagination of match details (optional)
          schema:
            type: integer
            format: int32
            minimum: 0
            default: 0
          allowEmptyValue: true
        - name: count
          in: query
          required: false
          description: The maximum number of match details to return (optional)
          schema:
            type: integer
            format: int32
            minimum: 1
            default: 10
          allowEmptyValue: true
      responses:
        "200":
          description: OK - Match IDs retrieved successfully for the specified parameters.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                  example: "EUW1_7736139185"
        "400":
          description: Bad Request - Invalid input parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/validationError"
        "401":
          description: Unauthorized - Invalid or missing Authentication
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/simpleError"
        "404":
          description: Not Found - No matches found for the given parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/simpleError"
        "429":
          description: Too Many Requests - Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/simpleError"
        "500":
          description: Internal Server Error - Failed to retrieve match IDs for the specified parameters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/simpleInternalError"
  /matches/{region}/{puuid}:
    get:
      operationId: getMatchesByPuuid
      tags:
        - Matches
      summary: Get Riot match details by player PUUID
      description: Retrieve a list of Riot match details for a specific player using their encrypted PUUID and region
      parameters:
        - name: region
          in: path
          required: true
          description: The region of the Riot account (e.g., America, Europe, Asia)
          schema:
            $ref: "#/components/schemas/Region"
          examples:
            euw1:
              value: euw1
            na1:
              value: na1
            kr:
              value: kr
        - name: puuid
          in: path
          required: true
          description: The encrypted PUUID of the player to retrieve match details for
          schema:
            type: string
          examples:
            valid_puuid:
              value: "rkrmXhHeKayKBCXI_xngBNpnY_rBXwyPMW_PtY-JaSzHj80gjfuesdk5GtiRxqGxavf2T7Ek-JPJrg"
              description: A sample encrypted PUUID for EUW region
        - name: start
          in: query
          required: false
          description: The starting index for pagination of match details (optional)
          schema:
            type: integer
            format: int32
            minimum: 0
            default: 0
          allowEmptyValue: true
        - name: count
          in: query
          required: false
          description: The maximum number of match details to return (optional)
          schema:
            type: integer
            format: int32
            minimum: 1
            default: 10
          allowEmptyValue: true
        - name: queueId
          in: query
          required: false
          description: Filter matches by queue type (optional)
          schema:
            $ref: "#/components/schemas/QueueId"
          examples:
            solo_queue:
              value: 420
              description: Ranked Solo/Duo Queue on Summoners Rift
            flex_queue:
              value: 440
              description: Ranked Flex Queue on Summoners Rift
            aram_mayhem:
              value: 2400
              description: ARAM on Howling Abyss
          allowEmptyValue: true
      responses:
        "200":
          description: OK - Match details retrieved successfully for the specified parameters.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Match"
        "400":
          description: Bad Request - Invalid input parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/validationError"
        "401":
          description: Unauthorized - Invalid or missing Authentication
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/simpleError"
        "404":
          description: Not Found - No matches found for the given parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/simpleError"
        "429":
          description: Too Many Requests - Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/simpleError"
        "500":
          description: Internal Server Error - Failed to retrieve match details for the specified parameters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/simpleInternalError"
  /leaderboard/{region}/{queue}/{tier}/{division}:
    get:
      operationId: getLeaderboard
      tags:
        - Leagues
      summary: Get Riot leaderboard entries by queue, tier, and division
      description: Retrieve Riot leaderboard entries for a specific region, queue type, tier, and division
      parameters:
        - name: region
          in: path
          required: true
          description: The region of the Riot account (e.g., NA, EUW, EUNE)
          schema:
            $ref: "#/components/schemas/Region"
          examples:
            NA:
              value: na1
              description: North America
            EUW:
              value: euw1
              description: Europe West
            EUNE:
              value: eun1
              description: Europe Nordic & East
        - name: queue
          in: path
          required: true
          description: The queue type (e.g., RANKED_SOLO_5x5, RANKED_FLEX_SR)
          schema:
